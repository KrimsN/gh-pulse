global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: pulse-api
    static_configs:
      - targets: ["pulse-api:8000"]

  - job_name: pulse-consumer
    static_configs:
      - targets: ["pulse-consumer:8001"]

  # gh-collector запускается с хоста, а не как сервис compose (см. docker-compose.yml), поэтому
  # адрес — не имя контейнера в сети ghpulse, а host-gateway (см. extra_hosts у prometheus).
  - job_name: gh-collector
    static_configs:
      - targets: ["host.docker.internal:9469"]
