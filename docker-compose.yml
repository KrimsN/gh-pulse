name: ghpulse

networks:
  ghpulse:
    name: ghpulse

volumes:
  ch-data:
  pg-data:
  redpanda-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8.14.39-alpine
    container_name: ghpulse-clickhouse
    networks: [ghpulse]
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ghpulse}
      CLICKHOUSE_SKIP_USER_SETUP: 1
    # Порты датасторов публикуются только на loopback: в форме "8123:8123" Docker слушает на всех
    # интерфейсах хоста, и беспарольный ClickHouse оказался бы доступен любому соседу по сети.
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - ch-data:/var/lib/clickhouse
      - ./infra/clickhouse/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16.10-alpine
    container_name: ghpulse-postgres
    networks: [ghpulse]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ghpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ghpulse}
      POSTGRES_DB: ${POSTGRES_DB:-ghpulse}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ghpulse} -d ${POSTGRES_DB:-ghpulse}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Одноразовый мигратор схемы Postgres — по образцу redpanda-init ниже: жёсткая зависимость от
  # postgres:healthy, restart:no, pulse-api ждёт его успешного завершения. Alembic (services/pulse-api/
  # alembic/, задача 2.5) — единственный источник истины для схемы PostgreSQL, поэтому initdb-том у
  # postgres выше снят: две параллельные схемы одной и той же базы разошлись бы при первом же
  # расхождении между ними.
  postgres-migrate:
    build:
      context: .
      dockerfile: services/pulse-api/Dockerfile
    container_name: ghpulse-postgres-migrate
    networks: [ghpulse]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-ghpulse}:${POSTGRES_PASSWORD:-ghpulse}@postgres:5432/${POSTGRES_DB:-ghpulse}
    command: ["alembic", "upgrade", "head"]
    # Дефолт, но записан явно, как и у redpanda-init: миграция обязана отработать и выйти, не
    # переоткрываться в цикле при сбое — с on-failure битая миграция дала бы рестарт-петлю вместо
    # внятного падения, которое видно в `docker compose ps`.
    restart: "no"

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    container_name: ghpulse-redpanda
    networks: [ghpulse]
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "127.0.0.1:9092:9092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Топики — часть инфраструктуры, а не побочный эффект первого продюсера: у образа Redpanda нет
  # хука docker-entrypoint-initdb.d, каким пользуются ClickHouse и PostgreSQL выше, поэтому его роль
  # играет одноразовый контейнер. Обоснование формы топиков — docs/adr/0008-gh-events-topic-design.md.
  redpanda-init:
    image: redpandadata/redpanda:v24.2.4   # тот же образ, что и брокер: rpk уже внутри
    container_name: ghpulse-redpanda-init
    networks: [ghpulse]
    depends_on:
      redpanda:
        condition: service_healthy
    # Переопределяются оба: у образа своя ENTRYPOINT-обёртка, и без явного entrypoint её CMD
    # приехал бы аргументами к скрипту.
    entrypoint: ["/usr/bin/bash"]
    command: ["/opt/ghpulse/create-topics.sh"]
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-gh.events}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-gh.events.dlq}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-6}
      KAFKA_TOPIC_RETENTION_MS: ${KAFKA_TOPIC_RETENTION_MS:-86400000}
    volumes:
      - ./infra/redpanda:/opt/ghpulse:ro
    # Дефолт, но записан явно: сервис обязан отработать и выйти. С on-failure неверно созданный
    # топик дал бы петлю рестартов вместо внятного падения.
    restart: "no"

  redis:
    image: redis:7.4.6-alpine
    container_name: ghpulse-redis
    networks: [ghpulse]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ghpulse-prometheus
    networks: [ghpulse]
    # gh-collector — CLI на хосте (см. комментарий у jaeger ниже), поэтому его /metrics недостижим по
    # имени сервиса в сети ghpulse. host-gateway работает и на Docker Desktop, и на Linux-хостах
    # (Docker 20.10+), где host.docker.internal без этой записи не резолвится вовсе.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Backend распределённой трассировки (ADR 0009): принимает OTLP/gRPC напрямую, свой OTel
  # Collector перед ним не нужен — Jaeger сам отдаёт всё, что нужно UI. Порт 4317 публикуется и на
  # loopback хоста: gh-collector — CLI, а не сервис compose (запускается с хоста, см. README), и
  # ему нужен путь к Jaeger снаружи docker-сети ghpulse тем же способом, каким он уже достаёт
  # redpanda через 127.0.0.1:9092.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: ghpulse-jaeger
    networks: [ghpulse]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"  # UI
      - "127.0.0.1:4317:4317"    # OTLP/gRPC
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:16686/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ghpulse-grafana
    networks: [ghpulse]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  pulse-api:
    build:
      context: .
      dockerfile: services/pulse-api/Dockerfile
    container_name: ghpulse-pulse-api
    networks: [ghpulse]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ghpulse}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-ghpulse}:${POSTGRES_PASSWORD:-ghpulse}@postgres:5432/${POSTGRES_DB:-ghpulse}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: pulse-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  pulse-consumer:
    build:
      context: .
      dockerfile: services/pulse-consumer/Dockerfile
    container_name: ghpulse-pulse-consumer
    networks: [ghpulse]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ghpulse}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-gh.events}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-gh.events.dlq}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_SERVICE_NAME: pulse-consumer
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      clickhouse:
        condition: service_healthy
      # Не просто redpanda: service_healthy — топики создаёт одноразовый redpanda-init (ADR 0008).
      # Консьюмер, стартовавший раньше него, застал бы gh.events автосозданным с одной партицией
      # вместо шести, и параллельность консьюмера тихо схлопнулась бы.
      redpanda-init:
        condition: service_completed_successfully
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8001/metrics')"]
      interval: 5s
      timeout: 3s
      retries: 10
