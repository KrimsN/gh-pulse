name: ghpulse

networks:
  ghpulse:
    name: ghpulse

volumes:
  ch-data:
  pg-data:
  redpanda-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8.14.39-alpine
    container_name: ghpulse-clickhouse
    networks: [ghpulse]
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ghpulse}
      CLICKHOUSE_SKIP_USER_SETUP: 1
    # Порты датасторов публикуются только на loopback: в форме "8123:8123" Docker слушает на всех
    # интерфейсах хоста, и беспарольный ClickHouse оказался бы доступен любому соседу по сети.
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - ch-data:/var/lib/clickhouse
      - ./infra/clickhouse/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16.10-alpine
    container_name: ghpulse-postgres
    networks: [ghpulse]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ghpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ghpulse}
      POSTGRES_DB: ${POSTGRES_DB:-ghpulse}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ghpulse} -d ${POSTGRES_DB:-ghpulse}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    container_name: ghpulse-redpanda
    networks: [ghpulse]
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "127.0.0.1:9092:9092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4.6-alpine
    container_name: ghpulse-redis
    networks: [ghpulse]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ghpulse-prometheus
    networks: [ghpulse]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ghpulse-grafana
    networks: [ghpulse]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  pulse-api:
    build:
      context: .
      dockerfile: services/pulse-api/Dockerfile
    container_name: ghpulse-pulse-api
    networks: [ghpulse]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ghpulse}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-ghpulse}:${POSTGRES_PASSWORD:-ghpulse}@postgres:5432/${POSTGRES_DB:-ghpulse}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
