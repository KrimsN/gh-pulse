default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21 # держим синхронно с версией ruff в dev-группе pyproject.toml
    hooks:
      - id: ruff-check
        args: [--fix]
        stages: [pre-commit, pre-push]
      - id: ruff-format
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: mypy-pulse-api
        name: mypy --strict (pulse-api)
        # используем venv проекта через uv, а не изолированное окружение pre-commit —
        # иначе пришлось бы вручную дублировать все рантайм-зависимости в additional_dependencies
        entry: uv run mypy --strict services/pulse-api
        language: system
        pass_filenames: false
        files: ^services/pulse-api/
        stages: [pre-commit, pre-push]

      # Go-сервис живёт в своём модуле, поэтому линтер запускается из его каталога: golangci-lint
      # ищет и .golangci.yml, и границы модуля относительно рабочего каталога, а из корня
      # репозитория (где go.mod нет) он просто не найдёт, что проверять.
      #
      # Проверка формата здесь же: gofmt включён в секции formatters конфига, и `run` сообщает о
      # неотформатированном коде обычной находкой. Отдельного хука на gofmt нет намеренно — как нет
      # и хука на `go vet`: govet входит в стандартный набор golangci-lint, и дублировать его
      # значило бы получать одну и ту же находку дважды.
      #
      # language: system, а не golang — тот же принцип, что у mypy выше: берём инструмент, уже
      # стоящий у разработчика (README → «Dev-зависимости»), вместо того чтобы pre-commit собирал
      # свою копию golangci-lint из исходников в изолированном окружении на несколько минут.
      - id: golangci-lint
        name: golangci-lint (gh-collector)
        entry: bash -c 'cd services/gh-collector && golangci-lint run'
        language: system
        pass_filenames: false
        files: ^services/gh-collector/
        types_or: [go, yaml]
        stages: [pre-commit, pre-push]

      # Тесты — только на pre-push. На pre-commit они бы платились временем за каждый промежуточный
      # коммит, а ловят ровно то, что всё равно обязано быть зелёным к моменту пуша (`main` зелёный
      # на каждый пуш — критерий выхода Фазы 0). -race не роскошь: коллектор конкурентный, а гонки
      # воспроизводятся не на каждом прогоне, и дешевле поймать их здесь, чем мигающим CI.
      - id: go-test
        name: go test -race (gh-collector)
        entry: bash -c 'cd services/gh-collector && go test -race ./...'
        language: system
        pass_filenames: false
        files: ^services/gh-collector/
        types: [go]
        stages: [pre-push]

      # Локальные рабочие заметки автора живут в репозитории, но версионируются отдельно от кода и
      # в общую историю не уходят. Хук — страховка от случайного `git add .`.
      # Раньше это были ручные скрипты в .git/hooks/{pre-commit,pre-push}; перенесены сюда, т. к.
      # pre-commit на нативном Windows Python не резолвит `#!/bin/sh` при вызове старых хуков
      # напрямую (ExecutableNotFoundError).
      - id: forbid-private-paths-staged
        name: локальные рабочие файлы в staged
        language: fail
        entry: >-
          ОШИБКА: коммит содержит локальные рабочие файлы, которые не версионируются в этом
          репозитории. Убрать их из индекса: git restore --staged <путь>.
        files: '^\.claude/|^(CLAUDE|AGENTS|SPEC)\.md$'
        stages: [pre-commit]

      - id: forbid-private-paths-tracked
        name: локальные рабочие файлы среди отслеживаемых
        # полное сканирование git ls-files, а не только диффа пуша — ловит утечку, даже если
        # коммит был сделан в обход pre-commit-хука (--no-verify)
        entry: >-
          bash -c 'leaked=$(git ls-files | grep -E "^\.claude/|^(CLAUDE|AGENTS|SPEC)\.md$"); if
          [ -n "$leaked" ]; then echo "ОШИБКА: локальные рабочие файлы среди отслеживаемых:" >&2; echo
          "$leaked" >&2; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
