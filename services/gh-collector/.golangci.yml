# Конфигурация golangci-lint для gh-collector. Лежит в корне Go-модуля, а не репозитория:
# golangci-lint запускается внутри модуля и конфиг ищет отсюда вверх.
#
# Набор осознанно узкий. Линтер, который шумит, быстро начинают игнорировать, а следом перестают
# читать и его настоящие находки — поэтому здесь только стандартный набор плюс два линтера,
# закрывающие конкретные ошибки, которые в этом сервисе реально можно совершить.
version: "2"

linters:
  # standard = errcheck, govet, ineffassign, staticcheck, unused. Отдельная джоба `go vet` в CI
  # больше не нужна: govet входит сюда.
  default: standard

  enable:
    # Коллектор — HTTP-клиент: каждый ответ GH Archive нужно закрыть, иначе соединение утекает из
    # пула, а при бэкфилле в тысячи часов (задача 1.4) это утечка на весь прогон. errcheck ловит
    # непроверенную ошибку, но не забытый resp.Body.Close() — это делает bodyclose.
    - bodyclose

    # Код опирается на errors.Is (сигнальная ошибка errUsage, context.Canceled, bufio.ErrTooLong).
    # errorlint ловит то, что это ломает: сравнение ошибок через == вместо errors.Is и обёртку
    # через %v вместо %w, после которой errors.Is перестаёт находить причину и вызывающий код молча
    # уходит в неверную ветку.
    - errorlint

formatters:
  # gofmt проверяется здесь, а не отдельным шагом: `golangci-lint run` сообщает о неотформатированном
  # коде как об обычной находке, а `golangci-lint fmt` умеет это исправить.
  enable:
    - gofmt
