name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Права по умолчанию шире, чем нужно: ни один джоб ничего не пишет в репозиторий.
permissions:
  contents: read

# Пуши в trunk идут часто, и прогон по устаревшему коммиту никому не интересен — отменяем его,
# не дожидаясь конца.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Держим синхронно с версией uv в services/pulse-api/Dockerfile.
  UV_VERSION: "0.11.28"

# Actions запинены по SHA, а не по тегу: тег перемещаем не мы, и подменённый тег утащил бы в прогон
# чужой код. Комментарий рядом называет человекочитаемую версию.

jobs:
  python-lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      # Без --all-packages ставится только корень workspace, и mypy не увидит fastapi со товарищи.
      - run: uv sync --all-packages

      # --no-fix обязателен: в pyproject.toml включён fix = true, и без флага ruff молча
      # исправил бы найденное и вернул успех — линт в CI всегда был бы зелёным.
      - run: uv run ruff check --no-fix .
      - run: uv run ruff format --check .
      # Раздельные вызовы, не один общий: у обоих сервисов пакет тестов называется одинаково —
      # tests/ (с __init__.py) — и mypy, в отличие от pytest (см. addopts в pyproject.toml),
      # не умеет различать два модуля с одинаковым именем в одном инвокейшне («Duplicate module
      # named "tests"»). pytest эту же коллизию решает через --import-mode=importlib.
      - run: uv run mypy --strict services/pulse-api
      - run: uv run mypy --strict services/pulse-consumer

  python-test:
    name: pytest
    runs-on: ubuntu-latest
    # 10 минут хватало, пока тестов был только pulse-api (httpx/ASGITransport, без датасторов).
    # test_consumer_integration.py поднимает настоящие Redpanda и ClickHouse через testcontainers
    # (проект не мокает датасторы, см. CLAUDE.md) — 20 минут — запас на холодный кэш образов, не
    # обычное время прогона (см. тот же запас у go-build-test).
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv sync --all-packages
      # --cov берёт исходники обоих сервисов явно: pythonpath добавляет их в sys.path (см.
      # pyproject.toml), но не в директорию запуска, откуда coverage.py ищет source по умолчанию.
      - run: uv run pytest --cov=services/pulse-api/app --cov=services/pulse-consumer/consumer --cov-report=lcov:coverage-python.lcov

      - name: Отправить покрытие в Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          # Репозиторий подключён в Coveralls вручную (не через GitHub App), поэтому дефолтного
          # github.token недостаточно — нужен per-repo токен из секрета.
          github-token: ${{ secrets.COVERALLS_REPO_TOKEN }}
          flag-name: python
          file: coverage-python.lcov
          parallel: true

  go-build-test:
    name: golangci-lint + go test
    runs-on: ubuntu-latest
    # 10 минут хватало, пока тесты были httptest-only. С задачи 1.4 internal/producer и
    # cmd/gh-collector поднимают настоящий брокер Redpanda через testcontainers-go (см. комментарий
    # к go test -race ниже) — на ubuntu-latest Docker уже есть, но первый прогон тянет образ
    # redpandadata/redpanda и testcontainers/ryuk с нуля, а несколько тестов поднимают контейнер
    # каждый по отдельности. 20 минут — запас на холодный кэш образов, не обычное время прогона.
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/gh-collector
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0

      # go-version-file вместо явной версии: единственный источник истины о версии Go — go.mod
      # самого сервиса, и разъехаться им негде.
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: services/gh-collector/go.mod
          # Кэш снова включён: задача 1.4 добавила первые внешние зависимости (franz-go,
          # prometheus/client_golang, testcontainers-go...), и go.sum теперь существует. До этого
          # коллектор был stdlib-only, кэшировать было нечего, а setup-go по умолчанию ищет go.sum
          # и спотыкается о его отсутствие — отсюда была cache: false.
          cache: true
          cache-dependency-path: services/gh-collector/go.sum

      - run: go build ./...

      # Тот же golangci-lint и тот же services/gh-collector/.golangci.yml, что и в pre-commit-хуке:
      # прогон в CI обязан совпадать с локальным, иначе хук перестают воспринимать всерьёз.
      # Отдельных шагов gofmt и go vet здесь нет намеренно — оба входят в golangci-lint (gofmt через
      # секцию formatters, govet в стандартном наборе линтеров).
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          # Держим синхронно с версией в README → «Dev-зависимости»: разъехавшиеся версии линтера
          # дают находки в CI, которых нет локально, — худший способ узнать о правиле.
          version: v2.12.2
          working-directory: services/gh-collector

      # -race: коллектор — конкурентный код (worker pool fetch-часов, producer-цикл, errgroup), а
      # гонки проявляются не на каждом прогоне. HTTP-путь GH Archive проверяется httptest'ом —
      # сети GitHub тесты не касаются. internal/producer и cmd/gh-collector, наоборот, поднимают
      # настоящий Redpanda через testcontainers-go (проект не мокает датасторы, см. CLAUDE.md) —
      # ubuntu-latest даёт Docker из коробки, отдельная настройка не нужна.
      # -covermode=atomic обязателен вместе с -race: счётчик покрытия по умолчанию (set) не
      # потокобезопасен, и параллельные тесты дают гонку на самом инструменте покрытия.
      - run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Отправить покрытие в Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.COVERALLS_REPO_TOKEN }}
          flag-name: go
          file: services/gh-collector/coverage.out
          format: golang
          parallel: true

  docker-smoke:
    name: docker compose up + /health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.0.0

      # Парадная дверь репозитория: чистый клон → docker compose up → /health = 200. Здесь же
      # проверяется, что Dockerfile'ы собираются, — отдельный build-джоб был бы тем же самым.
      # Все переменные в compose имеют дефолты, поэтому .env не нужен.
      - name: Поднять окружение
        run: docker compose up --detach --build --wait --wait-timeout 300

      - name: Проверить /health
        run: curl --fail --show-error --silent localhost:8000/health

      - name: Логи при падении
        if: failure()
        run: docker compose logs

      - name: Погасить окружение
        if: always()
        run: docker compose down --volumes

  coverage-finish:
    name: coveralls (finish)
    runs-on: ubuntu-latest
    # python-test и go-build-test шлют свои отчёты с parallel: true — Coveralls держит билд
    # незавершённым, пока не придёт этот сигнал, иначе так и останется "pending" в UI.
    needs: [python-test, go-build-test]
    steps:
      - uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.COVERALLS_REPO_TOKEN }}
          parallel-finished: true
