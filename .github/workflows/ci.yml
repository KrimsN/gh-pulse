name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Права по умолчанию шире, чем нужно: ни один джоб ничего не пишет в репозиторий.
permissions:
  contents: read

# Пуши в trunk идут часто, и прогон по устаревшему коммиту никому не интересен — отменяем его,
# не дожидаясь конца.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Держим синхронно с версией uv в services/pulse-api/Dockerfile.
  UV_VERSION: "0.11.28"

# Actions запинены по SHA, а не по тегу: тег перемещаем не мы, и подменённый тег утащил бы в прогон
# чужой код. Комментарий рядом называет человекочитаемую версию.

jobs:
  python-lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      # Без --all-packages ставится только корень workspace, и mypy не увидит fastapi со товарищи.
      - run: uv sync --all-packages

      # --no-fix обязателен: в pyproject.toml включён fix = true, и без флага ruff молча
      # исправил бы найденное и вернул успех — линт в CI всегда был бы зелёным.
      - run: uv run ruff check --no-fix .
      - run: uv run ruff format --check .
      - run: uv run mypy --strict services/pulse-api

  python-test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv sync --all-packages
      - run: uv run pytest

  go-build-test:
    name: go vet + go test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/gh-collector
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0

      # go-version-file вместо явной версии: единственный источник истины о версии Go — go.mod
      # самого сервиса, и разъехаться им негде.
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: services/gh-collector/go.mod
          # Кэш выключен намеренно: коллектор stdlib-only, go.sum не существует — кэшировать нечего,
          # а setup-go по умолчанию ищет go.sum и спотыкается о его отсутствие. Появятся
          # зависимости (Kafka-клиент) — включить обратно вместе с cache-dependency-path.
          cache: false

      # gofmt не имеет режима проверки с ненулевым кодом возврата: -l печатает имена
      # неотформатированных файлов и молча выходит с нулём. Поэтому падаем по непустому выводу сами.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Не отформатировано gofmt:"; echo "$unformatted"; exit 1
          fi

      - run: go build ./...
      - run: go vet ./...

      # -race: коллектор — конкурентный код (fetch в одной горутине, потребление в другой), а гонки
      # проявляются не на каждом прогоне. Тесты не ходят в сеть: HTTP-путь проверяется httptest'ом.
      - run: go test -race ./...

  docker-smoke:
    name: docker compose up + /health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0

      # Парадная дверь репозитория: чистый клон → docker compose up → /health = 200. Здесь же
      # проверяется, что Dockerfile'ы собираются, — отдельный build-джоб был бы тем же самым.
      # Все переменные в compose имеют дефолты, поэтому .env не нужен.
      - name: Поднять окружение
        run: docker compose up --detach --build --wait --wait-timeout 300

      - name: Проверить /health
        run: curl --fail --show-error --silent localhost:8000/health

      - name: Логи при падении
        if: failure()
        run: docker compose logs

      - name: Погасить окружение
        if: always()
        run: docker compose down --volumes
